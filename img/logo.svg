<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-label="Sensory Rooms">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8F8BEA"/>
      <stop offset="1" stop-color="#82DCE8"/>
    </linearGradient>
  </defs>

  <!-- icon: rounded square with line-art brain -->
  <rect x="2" y="2" width="156" height="156" rx="40" fill="url(#iconGrad)"/>
  <g stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- left hemisphere -->
    <g>
      <path d="M74,30
               C58,20 42,28 42,42
               C26,44 20,60 29,70
               C18,78 20,96 34,100
               C34,113 47,123 59,117
               C64,127 74,128 74,118
               L74,30 Z"/>
      <path d="M52,46 C60,52 58,62 49,64"/>
      <path d="M40,74 C50,76 52,86 44,92"/>
      <path d="M57,94 C63,100 61,108 53,110"/>
    </g>
    <!-- right hemisphere (mirror) -->
    <g transform="translate(160,0) scale(-1,1)">
      <path d="M74,30
               C58,20 42,28 42,42
               C26,44 20,60 29,70
               C18,78 20,96 34,100
               C34,113 47,123 59,117
               C64,127 74,128 74,118
               L74,30 Z"/>
      <path d="M52,46 C60,52 58,62 49,64"/>
      <path d="M40,74 C50,76 52,86 44,92"/>
      <path d="M57,94 C63,100 61,108 53,110"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="192" y="88" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="68" letter-spacing="2" fill="#ffffff">SENSORY</text>
  <text x="196" y="140" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="34" letter-spacing="19" fill="#A5EBC8">ROOMS</text>
</svg>
